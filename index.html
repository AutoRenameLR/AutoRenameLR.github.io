<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Auto-Rename PDF (QR Deep Clean)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-pill { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans p-4 md:p-10">

    <div class="max-w-5xl mx-auto space-y-8">
        <header class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-center gap-6">
            <div class="p-4 bg-indigo-600 text-white rounded-2xl shadow-lg shadow-indigo-200">
                <i data-lucide="scan-face" class="w-10 h-10"></i>
            </div>
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-extrabold tracking-tight">PDF QR Renamer <span class="text-indigo-600">v5.0</span></h1>
                <p class="text-slate-500 font-medium italic mt-1">Deep Clean Mode: Mengatasi coretan dan noda hasil scan.</p>
            </div>
        </header>

        <section class="bg-white p-2 rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div id="dropZone" class="border-4 border-dashed border-slate-100 rounded-2xl p-12 text-center hover:bg-indigo-50/50 hover:border-indigo-200 transition-all cursor-pointer group relative">
                <input type="file" id="fileInput" multiple accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-indigo-100 transition-all">
                        <i data-lucide="shield-check" class="w-8 h-8 text-slate-400 group-hover:text-indigo-600"></i>
                    </div>
                    <h3 class="text-xl font-bold">Unggah PDF Loading Request</h3>
                    <p class="text-slate-400 mt-2">Versi ini lebih tahan terhadap coretan pulpen di sekitar QR.</p>
                </div>
            </div>
        </section>

        <main class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5 text-indigo-500"></i>
                    Log Pemrosesan
                </h2>
                <button id="btnDownloadZip" class="hidden bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-md shadow-indigo-100">
                    <i data-lucide="archive" class="w-4 h-4"></i> Download (.ZIP)
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50 text-slate-400 text-[11px] uppercase tracking-widest font-bold">
                            <th class="px-6 py-4">File Asli</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4">Nomor Loading Req</th>
                            <th class="px-6 py-4 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50">
                        <tr id="emptyState">
                            <td colspan="4" class="px-6 py-16 text-center">
                                <p class="text-slate-300 italic">Belum ada file yang diproses.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        lucide.createIcons();
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const btnDownloadZip = document.getElementById('btnDownloadZip');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        let processedFiles = [];

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
            dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
        });

        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
        fileInput.addEventListener('change', function(e) { handleFiles(this.files); });

        async function handleFiles(files) {
            const pdfFiles = Array.from(files).filter(f => f.type === 'application/pdf');
            if (pdfFiles.length === 0) return;
            if (emptyState) emptyState.style.display = 'none';
            for (let file of pdfFiles) { await processDeepCleanScan(file); }
        }

        function isRequestNumber(text) {
            if (!text) return false;
            const t = text.trim().toUpperCase();
            // Filter: Harus diawali L, panjang minimal 10, dan bukan link web
            return t.startsWith('L') && t.length >= 8 && !t.includes('HTTP');
        }

        // Membersihkan area sekitar QR dari coretan pulpen (warna biru/merah)
        function cleanImageData(imgData, threshold) {
            const { data } = imgData;
            const output = new Uint8ClampedArray(data.length);
            for (let i = 0; i < data.length; i += 4) {
                // Konversi ke grayscale menggunakan bobot untuk mematikan warna biru/merah coretan
                const r = data[i], g = data[i+1], b = data[i+2];
                const gray = (r * 0.299 + g * 0.587 + b * 0.114);
                
                // Jika warna terlalu cerah (tinta pulpen pudar atau noda), paksa jadi putih murni
                const v = gray < threshold ? 0 : 255;
                output[i] = output[i+1] = output[i+2] = v;
                output[i+3] = 255;
            }
            return output;
        }

        async function processDeepCleanScan(file) {
            const rowId = 'r-' + Math.random().toString(36).substr(2, 5);
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors group";
            tr.innerHTML = `
                <td class="px-6 py-4 font-medium text-slate-600 truncate max-w-[200px]">${file.name}</td>
                <td class="px-6 py-4 text-center" id="st-${rowId}"><div class="loader mx-auto"></div></td>
                <td class="px-6 py-4 font-mono text-[10px] text-slate-400 italic" id="qr-${rowId}">Deep Scanning...</td>
                <td class="px-6 py-4 text-right" id="ac-${rowId}">-</td>
            `;
            tableBody.appendChild(tr);

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                
                // Scale ditingkatkan ke 7.0 untuk detail mikroskopis QR padat
                const viewport = page.getViewport({ scale: 7.0 });
                hiddenCanvas.width = viewport.width;
                hiddenCanvas.height = viewport.height;
                
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                // Definisi Area: QR Loading Request di foto ada di Tengah Atas
                const xStart = Math.floor(hiddenCanvas.width * 0.2);
                const xWidth = Math.floor(hiddenCanvas.width * 0.6);
                const yHeight = Math.floor(hiddenCanvas.height * 0.45);
                
                const headerData = ctx.getImageData(xStart, 0, xWidth, yHeight);
                
                let detectedCode = null;

                // Strategi: Loop beberapa threshold pembersihan
                const cleanThresholds = [140, 180, 110, 210];
                for (let t of cleanThresholds) {
                    const cleaned = cleanImageData(headerData, t);
                    const result = jsQR(cleaned, headerData.width, headerData.height, {
                        inversionAttempts: "dontInvert"
                    });
                    
                    if (result && isRequestNumber(result.data)) {
                        detectedCode = result.data.trim();
                        break;
                    }
                }

                if (detectedCode) {
                    const finalName = detectedCode.replace(/[^a-zA-Z0-9\-_]/g, '_') + ".pdf";

                    document.getElementById(`st-${rowId}`).innerHTML = '<span class="status-pill bg-emerald-100 text-emerald-700">SUKSES</span>';
                    document.getElementById(`qr-${rowId}`).innerText = detectedCode;
                    document.getElementById(`qr-${rowId}`).className = "px-6 py-4 font-mono text-xs text-indigo-600 font-bold";
                    
                    const blobUrl = URL.createObjectURL(file);
                    document.getElementById(`ac-${rowId}`).innerHTML = `
                        <a href="${blobUrl}" download="${finalName}" class="text-indigo-600 hover:text-indigo-900 font-bold text-xs uppercase bg-indigo-50 px-3 py-1.5 rounded-lg transition-all">Simpan</a>
                    `;
                    processedFiles.push({ originalFile: file, newName: finalName });
                    btnDownloadZip.classList.remove('hidden');
                    lucide.createIcons();
                } else {
                    document.getElementById(`st-${rowId}`).innerHTML = '<span class="status-pill bg-rose-100 text-rose-700">GAGAL</span>';
                    document.getElementById(`qr-${rowId}`).innerText = "QR Terlalu banyak coretan/buram.";
                }

            } catch (err) {
                document.getElementById(`st-${rowId}`).innerHTML = '<span class="status-pill bg-slate-100 text-slate-500">ERR</span>';
            }
        }

        btnDownloadZip.addEventListener('click', async () => {
            const zip = new JSZip();
            processedFiles.forEach(f => zip.file(f.newName, f.originalFile));
            const blob = await zip.generateAsync({ type: "blob" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Loading_Request_Clean_Rename.zip";
            a.click();
        });
    </script>
</body>
</html>
